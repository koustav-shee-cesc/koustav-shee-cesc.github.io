<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CESC Flipbook</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.36/dflip/css/dflip.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.36/dflip/css/themify-icons.min.css">
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #222; }
        #my-flipbook { height: 100vh; width: 100%; }
    </style>
</head>
<body>

    <div id="my-flipbook" class="_df_book" source="book.pdf"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.36/dflip/js/dflip.min.js"></script>

    <script>
        // This checks if the library is loaded before trying to use it
        window.DFLIP_LIB_URL = "https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.36/dflip/";
        
        $(document).ready(function () {
            if (typeof $.fn.flipBook !== 'function') {
                console.log("Waiting for DearFlip to load...");
            }
        });
    </script>

</body>
</html>
